name: Spring Boot → NAS Docker 배포

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Java 17 + Gradle 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: Gradle 빌드
        run: ./gradlew clean build -x test

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker 이미지 빌드 & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/lineofduty:latest

  deploy:
    needs: build
    runs-on: self-hosted
    permissions:
      contents: read
      packages: read

    steps:
      - name: GHCR 로그인 (PAT 사용)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: 환경 변수 파일(.env) 생성
        run: |
          rm -f .env
          touch .env

          # 1. 데이터베이스 설정
          echo "DB_URL=${{ secrets.DB_URL }}" >> .env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DDL_AUTO=update" >> .env

          # 2. Redis 설정
          echo "REDIS_HOST=${{ secrets.REDIS_HOST }}" >> .env
          echo "REDIS_PORT=${{ secrets.REDIS_PORT }}" >> .env

          # 3. JWT / 보안 설정
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "AES_SECRET_KEY=${{ secrets.AES_SECRET_KEY }}" >> .env
          echo "ADMIN_TOKEN=${{ secrets.ADMIN_TOKEN }}" >> .env

          # 4. 메일 설정
          echo "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" >> .env
          echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> .env

          # 5. 카카오 OAuth 설정
          echo "KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}" >> .env
          echo "KAKAO_REDIRECT_URI=${{ secrets.KAKAO_REDIRECT_URI }}" >> .env

          # 6. 프론트엔드 URL
          echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" >> .env

          # 7. 외부 API 설정
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "TOSS_SECRET_KEY=${{ secrets.TOSS_SECRET_KEY }}" >> .env
          echo "WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}" >> .env

          # 8. MinIO 설정
          echo "MINIO_ENDPOINT=${{ secrets.MINIO_ENDPOINT }}" >> .env
          echo "MINIO_PUBLIC_ENDPOINT=${{ secrets.MINIO_PUBLIC_ENDPOINT }}" >> .env
          echo "MINIO_ACCESS_KEY=${{ secrets.MINIO_ACCESS_KEY }}" >> .env
          echo "MINIO_SECRET_KEY=${{ secrets.MINIO_SECRET_KEY }}" >> .env
          echo "MINIO_BUCKET=${{ secrets.MINIO_BUCKET }}" >> .env

          # 9. 기타
          echo "TZ=Asia/Seoul" >> .env

      - name: NAS에 자동 배포
        run: |
          echo "🧹 기존 컨테이너 정리 중..."
          docker stop lineofduty-app 2>/dev/null || true
          docker rm -f lineofduty-app 2>/dev/null || true

          echo "📥 최신 도커 이미지 다운로드 중..."
          docker pull ghcr.io/${{ github.repository_owner }}/lineofduty:latest

          echo "🚀 새 컨테이너 실행 중..."
          docker run -d \
            --name lineofduty-app \
            --restart always \
            --network lineofduty \
            -p 8081:8080 \
            --env-file .env \
            ghcr.io/${{ github.repository_owner }}/lineofduty:latest
