name: Cd
on:
  push:
    branches:
      - product

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  IMAGE_TAG: ${{ github.sha }}
  APP_NAME: Lineofduty

jobs:
  build-and-push:
    name: build & push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant Execute Permission For gradlew
        run: chmod +x gradlew

      # [수정됨] -x test 옵션을 추가하여 테스트를 건너뜁니다.
      - name: Build Jar
        run: ./gradlew clean build -x test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Docker 빌드 시 context(.)를 명시하고 태그를 붙입니다.
      - name: Build and Push Docker Image
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          
          # script에서 사용할 변수들을 envs에 나열합니다.
          envs: ECR_REGISTRY,ECR_REPOSITORY,IMAGE_TAG,APP_NAME,AWS_REGION
          
          script: |
            echo "Deploying $APP_NAME with tag $IMAGE_TAG"
            
            # ECR 로그인
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY

            # .env 파일 생성 (운영 환경 변수 주입)
            echo "${{ secrets.ENV }}" > .env

            # 최신 이미지 pull
            docker pull $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
            
            # 기존 컨테이너 중지 및 삭제 (에러 무시 || true)
            docker stop $APP_NAME || true
            docker rm $APP_NAME || true
            
            # 새 컨테이너 실행
            docker run -d \
              --env-file .env \
              --name $APP_NAME \
              -p 8080:8080 \
              $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
            
            # (선택) 불필요한 이미지 정리
            docker image prune -f
